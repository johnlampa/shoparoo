# Pings the Render app so free-tier instances don't spin down after 15m idle.
# UptimeRobot alone can still report 502s during slow cold starts; this reduces
# how often the service sleeps. Note: keeping it awake 24/7 uses ~720 of the
# 750 free instance hours/month.
name: Keepalive Render

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /up
        run: |
          set -e
          # Allow time for occasional Render cold starts
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 90 "https://shoparoo.onrender.com/up" || true)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Keepalive failed after retries"
          exit 1
